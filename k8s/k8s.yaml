apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: 730335608828.dkr.ecr.us-east-2.amazonaws.com/gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: AUTH_SERVICE_URL
              value: "http://auth:8080"
            - name: ACCOUNT_SERVICE_URL
              value: "http://account:8080"
            - name: PRODUCT_SERVICE_URL
              value: "http://product:8080"
            - name: ORDER_SERVICE_URL
              value: "http://order:8080"

---

apiVersion: v1
kind: Service
metadata:
  name: gateway
spec:
  selector:
    app: gateway
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  type: LoadBalancer